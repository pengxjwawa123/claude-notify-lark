<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 320" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="320" rx="12" fill="url(#bg)"/>

  <!-- Claude Code Box -->
  <rect x="30" y="40" width="160" height="80" rx="10" fill="#1d4ed8" filter="url(#shadow)"/>
  <text x="110" y="72" text-anchor="middle" fill="white" font-size="13" font-weight="bold">Claude Code</text>
  <text x="110" y="92" text-anchor="middle" fill="#93c5fd" font-size="11">Stop / Notification</text>
  <text x="110" y="108" text-anchor="middle" fill="#93c5fd" font-size="11">event fires</text>

  <!-- Arrow 1 -->
  <line x1="190" y1="80" x2="240" y2="80" stroke="#60a5fa" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <defs><marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#60a5fa"/></marker></defs>

  <!-- Hook Script Box -->
  <rect x="240" y="40" width="180" height="80" rx="10" fill="#047857" filter="url(#shadow)"/>
  <text x="330" y="68" text-anchor="middle" fill="white" font-size="13" font-weight="bold">claude_lark_notify.py</text>
  <text x="330" y="88" text-anchor="middle" fill="#6ee7b7" font-size="11">Parse transcript</text>
  <text x="330" y="104" text-anchor="middle" fill="#6ee7b7" font-size="11">Build rich card</text>

  <!-- Arrow 2 -->
  <line x1="420" y1="80" x2="470" y2="80" stroke="#34d399" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <defs><marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#34d399"/></marker></defs>

  <!-- Lark API Box -->
  <rect x="470" y="40" width="140" height="80" rx="10" fill="#7c3aed" filter="url(#shadow)"/>
  <text x="540" y="68" text-anchor="middle" fill="white" font-size="13" font-weight="bold">Lark API</text>
  <text x="540" y="88" text-anchor="middle" fill="#c4b5fd" font-size="11">tenant_token</text>
  <text x="540" y="104" text-anchor="middle" fill="#c4b5fd" font-size="11">send message</text>

  <!-- Arrow 3 -->
  <line x1="610" y1="80" x2="660" y2="80" stroke="#a78bfa" stroke-width="2" marker-end="url(#arrowPurple)"/>
  <defs><marker id="arrowPurple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#a78bfa"/></marker></defs>

  <!-- Lark App Box -->
  <rect x="660" y="40" width="110" height="80" rx="10" fill="#dc2626" filter="url(#shadow)"/>
  <text x="715" y="72" text-anchor="middle" fill="white" font-size="13" font-weight="bold">飞书 / Lark</text>
  <text x="715" y="92" text-anchor="middle" fill="#fca5a5" font-size="11">Rich card</text>
  <text x="715" y="108" text-anchor="middle" fill="#fca5a5" font-size="11">notification</text>

  <!-- Card Preview -->
  <rect x="30" y="150" width="340" height="145" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1" filter="url(#shadow)"/>

  <!-- Card Header -->
  <rect x="30" y="150" width="340" height="32" rx="8" fill="#0d9488"/>
  <rect x="30" y="170" width="340" height="12" fill="#0d9488"/>
  <text x="45" y="170" fill="white" font-size="12" font-weight="bold">✅ Claude Code 任务完成</text>

  <!-- Card Content -->
  <text x="45" y="200" fill="#94a3b8" font-size="10">📁 Project: my-app</text>
  <text x="220" y="200" fill="#94a3b8" font-size="10">💻 Device: MacBook</text>

  <line x1="45" y1="210" x2="355" y2="210" stroke="#334155" stroke-width="1"/>

  <text x="45" y="225" fill="#94a3b8" font-size="10">⏱ 1m 23s</text>
  <text x="110" y="225" fill="#94a3b8" font-size="10">📊 3.2k / 45k</text>
  <text x="200" y="225" fill="#94a3b8" font-size="10">🔧 8 / 120</text>
  <text x="270" y="225" fill="#94a3b8" font-size="10">🌿 main</text>

  <line x1="45" y1="235" x2="355" y2="235" stroke="#334155" stroke-width="1"/>

  <text x="45" y="252" fill="#94a3b8" font-size="10">💬 Claude 的回复</text>
  <text x="45" y="267" fill="#64748b" font-size="9">Task completed. 3 files modified...</text>

  <line x1="45" y1="278" x2="355" y2="278" stroke="#334155" stroke-width="1"/>
  <text x="45" y="290" fill="#475569" font-size="8">📂 /Users/me/project  |  🔑 abc123  |  🕐 10:30:15</text>

  <!-- Notification Card Preview -->
  <rect x="420" y="150" width="340" height="100" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1" filter="url(#shadow)"/>
  <rect x="420" y="150" width="340" height="32" rx="8" fill="#ea580c"/>
  <rect x="420" y="170" width="340" height="12" fill="#ea580c"/>
  <text x="435" y="170" fill="white" font-size="12" font-weight="bold">⚠️ Claude Code 需要你的确认</text>
  <text x="435" y="200" fill="#94a3b8" font-size="10">📁 Project: my-app</text>
  <text x="610" y="200" fill="#94a3b8" font-size="10">💻 Device: MacBook</text>
  <line x1="435" y1="210" x2="745" y2="210" stroke="#334155" stroke-width="1"/>
  <text x="435" y="226" fill="#94a3b8" font-size="10">💬 Claude wants to run: rm -rf /tmp/cache</text>
  <text x="435" y="244" fill="#475569" font-size="8">📂 /Users/me/project  |  🕐 10:32:01</text>

  <!-- Sub-agent Card -->
  <rect x="420" y="265" width="340" height="28" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <rect x="420" y="265" width="340" height="28" rx="8" fill="#2563eb" opacity="0.3"/>
  <text x="435" y="284" fill="#93c5fd" font-size="11" font-weight="bold">🔧 子 Agent 完成 — optimizer</text>
</svg>
